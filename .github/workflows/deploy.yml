name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: deploy

      - name: Deploy to ECS via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 121.196.229.11
          username: root
          key: ${{ secrets.DEPLOY_SECRET }}
          script: |
            set -e
            TARGET="/var/www/jk-probability"
            
            # Backup user data before reset
            DATA_FILE="$TARGET/submissions.json"
            DATA_BACKUP="/tmp/submissions.json.bak"
            if [ -f "$DATA_FILE" ]; then
              cp "$DATA_FILE" "$DATA_BACKUP"
            fi
            
            # Pull latest code from GitHub
            cd "$TARGET"
            git fetch origin main
            git reset --hard origin/main
            
            # Restore user data (git reset would overwrite it)
            if [ -f "$DATA_BACKUP" ]; then
              cp "$DATA_BACKUP" "$DATA_FILE"
            fi
            
            # Ensure data file exists and is writable
            touch "$DATA_FILE"
            chmod 666 "$DATA_FILE"
            
            # Restart PM2
            pm2 stop jk-server 2>/dev/null || true
            pm2 start "$TARGET/ecosystem.config.js" 2>/dev/null || \
              pm2 start server.js --name jk-server
            pm2 save
            
            echo "Deployed $(date) | data preserved"
