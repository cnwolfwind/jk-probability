name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to ECS via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 121.196.229.11
          username: root
          key: ${{ secrets.DEPLOY_SECRET }}
          script: |
            TARGET="/var/www/jk-probability"
            if [ -d "$TARGET/.git" ]; then
              cd "$TARGET"
              git fetch origin main
              git reset --hard origin/main
              echo "git reset OK at $(date)"
            else
              rm -rf "$TARGET"
              git clone https://github.com/cnwolfwind/jk-probability.git "$TARGET"
              echo "git clone OK at $(date)"
            fi
            echo "Deployed at $(date)"
