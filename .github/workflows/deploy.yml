name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup rsync
        run: sudo apt-get install -y rsync

      - name: Deploy to ECS
        env:
          DEPLOY_KEY: *** secrets.DEPLOY_SECRET }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh-keyscan -H 121.196.229.11 >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key" \
            ${{ github.workspace }}/ root@121.196.229.11:/var/www/jk-probability/
          echo "Deployment completed at $(date)"  
