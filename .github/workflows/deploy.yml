name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: deploy

      - name: Deploy to ECS via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 121.196.229.11
          username: root
          key: ${{ secrets.DEPLOY_SECRET }}
          script: |
            set -e
            TARGET="/var/www/jk-probability"
            
            # Pull latest from GitHub
            cd "$TARGET"
            git fetch origin main
            git reset --hard origin/main
            
            # Ensure submissions.json is writable
            touch "$TARGET/submissions.json"
            chmod 666 "$TARGET/submissions.json"
            
            # Restart PM2
            pm2 stop jk-server 2>/dev/null || true
            pm2 start "$TARGET/ecosystem.config.js" || pm2 start server.js --name jk-server
            pm2 save
            
            echo "Deployed $(date)"
